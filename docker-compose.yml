services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: netwatch-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - netwatch-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: netwatch-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - ./kafka:/kafka:ro
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - netwatch-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: netwatch-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: netwatch
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - netwatch-net

  zeek:
    build:
      context: ./zeek
      dockerfile: Dockerfile
    container_name: netwatch-zeek
    restart: unless-stopped
    volumes:
      - ./zeek/logs:/logs
      - ./zeek/pcap:/pcap:ro
      - ./zeek/config:/zeek-config:ro
    networks:
      - netwatch-net

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: netwatch-filebeat
    restart: unless-stopped
    user: root
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./zeek/logs:/zeek/logs:ro
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    command: ["--strict.perms=false"]
    networks:
      - netwatch-net

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: netwatch-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_PORT}:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - netwatch-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: netwatch-opensearch-dashboards
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT}:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    networks:
      - netwatch-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.89.0
    container_name: netwatch-otel-collector
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT}:4317"
      - "${OTEL_HTTP_PORT}:4318"
      - "${OTEL_PROM_PORT}:8889"
    networks:
      - netwatch-net

  postgres:
    image: postgres:16-alpine
    container_name: netwatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - netwatch-net

  python-processor:
    build:
      context: ./python-processor
      dockerfile: Dockerfile
    container_name: netwatch-processor
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      OPENSEARCH_URL: ${OPENSEARCH_URL}
      OPENSEARCH_INDEX_PREFIX: ${OPENSEARCH_INDEX_PREFIX}
      INTERNAL_CIDR_RANGES: ${INTERNAL_CIDR_RANGES}
      ALERT_THRESHOLD_REQUESTS_PER_MINUTE: ${ALERT_THRESHOLD_REQUESTS_PER_MINUTE}
      POSTGRES_DSN: ${POSTGRES_DSN}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "${PROCESSOR_PORT}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys;sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/health\").status==200 else 1)'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - netwatch-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netwatch-frontend
    restart: unless-stopped
    depends_on:
      - python-processor
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT}:3000"
    networks:
      - netwatch-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: netwatch-grafana
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-opensearch-datasource
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-storage:/var/lib/grafana
    networks:
      - netwatch-net

volumes:
  opensearch-data:
  postgres-data:
  grafana-storage:

networks:
  netwatch-net:
    driver: bridge
