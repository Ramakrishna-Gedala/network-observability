receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: netwatch-processor
          scrape_interval: 15s
          static_configs:
            - targets: ["python-processor:8000"]

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 400
    spike_limit_mib: 50

  batch:
    send_batch_size: 512
    timeout: 5s

  resource:
    attributes:
      - key: service.namespace
        value: netwatch
        action: upsert
      - key: deployment.environment
        value: development
        action: upsert

exporters:
  opensearch:
    http:
      endpoint: http://opensearch:9200
    logs_index: otel-logs

  logging:
    loglevel: warn

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: netwatch

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [opensearch, logging]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging]
